<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Насти ❤️</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="stars"></div>

    <div class="container" id="container">
        <div class="envelope" id="envelope">
            <div class="envelope-top"></div>
            <div class="envelope-body">
                <div class="heart-seal">❤️</div>
            </div>
            <p class="hint">Нажми на конверт</p>
        </div>

        <div class="letter hidden" id="letter">
            <div class="letter-content">
                <h1 class="title">Моей любимой Насте</h1>

                <div class="text-block">
                    <p>Привет, пупсек! ❤️</p>

                    <p>Я люблю тебя больше, чем могут передать любые слова.</p>

                    <p>Вот тибе снизу секси песня.</p>

                    <p class="signature">Артём ❤️</p>
                </div>

                <button class="music-toggle" id="musicToggle">
                    <span class="music-icon">🎵</span>
                    <span class="music-text">Включить музыку</span>
                </button>
            </div>
        </div>
    </div>

    <audio id="backgroundMusic" loop>
        <source src="assets/music.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
